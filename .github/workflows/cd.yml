name: GitOps Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Descargar código
        uses: actions/checkout@v4
      
      - name: Instalar Ansible
        run: |
          sudo apt update
          sudo apt install ansible -y
          
      - name: Ejecutar Ansible
        run: ansible-playbook -i inventario.ini playbook.yml